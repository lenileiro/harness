name: harness-review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: harness code review
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.fork == false
    env:
      HARNESS_PROVIDER: ${{ vars.HARNESS_PROVIDER }}
      HARNESS_MODEL: ${{ vars.HARNESS_MODEL }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync workspace
        run: uv sync --all-extras --all-groups

      - name: Run Harness review
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          provider="${HARNESS_PROVIDER:-openrouter}"
          model="${HARNESS_MODEL:-google/gemma-4-26b-a4b-it}"
          uv run harness review \
            --base "origin/${{ github.base_ref }}" \
            --provider "$provider" \
            --model "$model" \
            --json \
            > .artifacts/review.json

      - name: Render markdown summary
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path(".artifacts/review.json").read_text())
          lines = ["## Harness review", ""]
          summary = (report.get("summary") or "").strip()
          if summary:
              lines.append(summary)
              lines.append("")
          findings = report.get("findings") or []
          if not findings:
              lines.append("No findings.")
          else:
              for finding in findings:
                  severity = finding.get("severity", "info")
                  file = finding.get("file", "unknown")
                  line = finding.get("line")
                  issue = finding.get("issue", "").strip()
                  rationale = finding.get("rationale", "").strip()
                  location = f"{file}:{line}" if line else file
                  lines.append(
                      f"- **{severity.upper()}** `{location}`: {issue}"
                  )
                  if rationale:
                      lines.append(f"  - {rationale}")
          Path(".artifacts/review.md").write_text("\n".join(lines) + "\n")
          PY

      - name: Upload review artifact
        uses: actions/upload-artifact@v4
        with:
          name: harness-review
          path: .artifacts/review.*

      - name: Comment on pull request
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const body = fs.readFileSync(".artifacts/review.md", "utf8");
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
            });
            const marker = "<!-- harness-review -->";
            const existing = comments.data.find((comment) =>
              comment.body && comment.body.includes(marker)
            );
            const nextBody = `${marker}\n${body}`;
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: nextBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body: nextBody,
              });
            }
