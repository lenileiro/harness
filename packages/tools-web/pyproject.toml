[project]
name = "tools-web"
version = "0.0.0"
description = "HTTP fetch tool for Harness agents."
requires-python = ">=3.11"
dependencies = [
    "core",
    "duckduckgo-search>=8.1.1",
    "httpx>=0.27",
    "playwright>=1.60.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/harness"]

[tool.uv.sources]
core = { workspace = true }
