[project]
name = "tools-web"
version = "0.0.0"
description = "HTTP fetch tool for Harness agents."
requires-python = ">=3.11"
dependencies = [
    "core",
    "httpx>=0.27",
    "tavily-python>=0.7.24",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/harness"]

[tool.uv.sources]
core = { workspace = true }
