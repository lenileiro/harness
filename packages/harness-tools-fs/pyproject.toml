[project]
name = "harness-tools-fs"
version = "0.0.0"
description = "Filesystem tools (read, write, edit, list, glob) for Harness agents."
requires-python = ">=3.11"
dependencies = ["harness-core"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/harness"]

[tool.uv.sources]
harness-core = { workspace = true }
