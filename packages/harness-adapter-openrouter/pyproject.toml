[project]
name = "harness-adapter-openrouter"
version = "0.0.0"
description = "OpenRouter HTTP/SSE adapter for Harness."
requires-python = ">=3.11"
dependencies = [
    "harness-core",
    "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/harness"]

[tool.uv.sources]
harness-core = { workspace = true }
