[project]
name = "tools-shell"
version = "0.0.0"
description = "Shell execution tool for Harness agents."
requires-python = ">=3.11"
dependencies = ["core"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/harness"]

[tool.uv.sources]
core = { workspace = true }
