[project]
name = "cli"
version = "0.0.0"
description = "Typer + Rich CLI for the Harness agent runtime."
requires-python = ">=3.11"
dependencies = [
    "core",
    "tasks",
    "storage-memory",
    "storage-sqlite",
    "adapter-ollama",
    "adapter-openrouter",
    "tools-fs",
    "tools-shell",
    "tools-web",
    "typer>=0.13",
    "rich>=13.9",
    "unicodeitplus>=0.3.1",
    "python-dotenv>=1.0",
]

[project.scripts]
harness = "harness.cli.__main__:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/harness"]

[tool.uv.sources]
core = { workspace = true }
tasks = { workspace = true }
storage-memory = { workspace = true }
storage-sqlite = { workspace = true }
adapter-ollama = { workspace = true }
adapter-openrouter = { workspace = true }
tools-fs = { workspace = true }
tools-shell = { workspace = true }
tools-web = { workspace = true }
