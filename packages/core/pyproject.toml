[project]
name = "core"
version = "0.0.0"
description = "Core protocols, schemas, and runtime for the Harness agent runtime."
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7",
    "structlog>=24.4",
    "tiktoken>=0.8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/harness"]
