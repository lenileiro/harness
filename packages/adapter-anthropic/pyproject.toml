[project]
name = "adapter-anthropic"
version = "0.0.0"
description = "Anthropic Messages API adapter for Harness."
requires-python = ">=3.11"
dependencies = [
    "core",
    "anthropic>=0.40",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/harness"]

[tool.uv.sources]
core = { workspace = true }
