[project]
name = "storage-memory"
version = "0.0.0"
description = "In-memory Session storage for Harness."
requires-python = ">=3.11"
dependencies = ["core", "tasks"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/harness"]

[tool.uv.sources]
core = { workspace = true }
tasks = { workspace = true }
