[project]
name = "harness-storage-sqlite"
version = "0.0.0"
description = "SQLite-backed Session storage for Harness (via aiosqlite)."
requires-python = ">=3.11"
dependencies = [
    "harness-core",
    "aiosqlite>=0.20",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/harness"]

[tool.uv.sources]
harness-core = { workspace = true }
