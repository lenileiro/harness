[project]
name = "harness-cli"
version = "0.0.0"
description = "Typer + Rich CLI for the Harness agent runtime."
requires-python = ">=3.11"
dependencies = [
    "harness-core",
    "harness-storage-memory",
    "harness-storage-sqlite",
    "harness-adapter-ollama",
    "harness-adapter-openrouter",
    "harness-tools-fs",
    "harness-tools-shell",
    "harness-tools-web",
    "typer>=0.13",
    "rich>=13.9",
]

[project.scripts]
harness = "harness.cli.__main__:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/harness"]

[tool.uv.sources]
harness-core = { workspace = true }
harness-storage-memory = { workspace = true }
harness-storage-sqlite = { workspace = true }
harness-adapter-ollama = { workspace = true }
harness-adapter-openrouter = { workspace = true }
harness-tools-fs = { workspace = true }
harness-tools-shell = { workspace = true }
harness-tools-web = { workspace = true }
