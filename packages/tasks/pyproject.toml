[project]
name = "tasks"
version = "0.0.0"
description = "Durable tasks + activity log for the Harness agent runtime."
requires-python = ">=3.11"
dependencies = [
    "core",
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/harness"]

[tool.uv.sources]
core = { workspace = true }
